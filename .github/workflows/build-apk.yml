name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "main.py"
      - "buildozer.spec"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            libltdl-dev

      # ubuntu-22.04 runners ship several JDKs side by side (8/11/17/21/25)
      # with JAVA_HOME defaulting to 11 — the Android Gradle plugin requires
      # 17, and installing another JDK via apt doesn't change JAVA_HOME, so
      # point it at the one the runner already provides.
      - name: Select JDK 17 for Gradle
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"

      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache Android SDK/NDK and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-android-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-android-

      - name: Build APK with Buildozer
        run: yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: education-tracker-debug-apk
          path: bin/*.apk
